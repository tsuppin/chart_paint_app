<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>paint</title>
    <meta name="description" content="画像のアップロード、ペイント、保存ができるモダンで多機能なキャンバスアプリ。">
    <link rel="stylesheet" href="paint_styles.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar glass">
            <!-- 1段目: 描画ツール + カラーパレット -->
            <div class="toolbar-row">
                <section class="tool-section">
                    <div class="tool-grid">
                        <button id="btn-pencil" class="tool-btn active" title="フリーハンド">
                            <i class="fas fa-pencil-alt"></i>
                        </button>
                        <button id="btn-line" class="tool-btn" title="直線">
                            <i class="fas fa-minus"></i>
                        </button>
                        <button id="btn-circle" class="tool-btn" title="円">
                            <i class="far fa-circle"></i>
                        </button>
                        <button id="btn-text" class="tool-btn" title="テキスト">
                            <i class="fas fa-font"></i>
                        </button>
                        <button id="btn-move" class="tool-btn" title="移動 (削除: Delete)">
                            <i class="fas fa-arrows-alt"></i>
                        </button>
                    </div>
                </section>

                <section class="color-section">
                    <div class="color-palette">
                        <button class="color-btn active" data-color="#ff4d4d" title="赤" style="background-color: #ff4d4d;"></button>
                        <button class="color-btn" data-color="#2ecc71" title="緑" style="background-color: #2ecc71;"></button>
                        <button class="color-btn" data-color="#3498db" title="青" style="background-color: #3498db;"></button>
                        <button class="color-btn" data-color="#9b59b6" title="紫" style="background-color: #9b59b6;"></button>
                        <button class="color-btn" data-color="#e67e22" title="オレンジ" style="background-color: #e67e22;"></button>
                        <button class="color-btn" data-color="#f1c40f" title="黄色" style="background-color: #f1c40f;"></button>
                        <button class="color-btn" data-color="#ffffff" title="白" style="background-color: #ffffff;"></button>
                        <button class="color-btn" data-color="#1e1e1e" title="黒" style="background-color: #1e1e1e;"></button>
                    </div>
                </section>
            </div>

            <!-- 2段目: ブラシサイズ + アクションボタン -->
            <div class="toolbar-row">
                <section class="brush-section">
                    <button id="btn-brush-dec" class="size-adj-btn" title="ブラシを小さく"><i class="fas fa-minus"></i></button>
                    <input type="range" id="brush-size" min="1" max="50" value="5" title="ブラシの太さ">
                    <button id="btn-brush-inc" class="size-adj-btn" title="ブラシを大きく"><i class="fas fa-plus"></i></button>
                    <span id="brush-size-val">5px</span>
                </section>

                <section class="action-section">
                    <input type="file" id="image-upload" accept="image/*" hidden>
                    <button id="btn-upload" class="action-btn upload-btn" title="画像をアップロード">
                        <i class="fas fa-image"></i> 画像
                    </button>
                    <button id="btn-save" class="action-btn save-btn" title="保存する">
                        <i class="fas fa-download"></i> 保存
                    </button>
                    <button id="btn-undo" class="action-btn undo-btn" title="元に戻す (Ctrl+Z)" disabled>
                        <i class="fas fa-undo"></i>
                    </button>
                    <button id="btn-clear" class="action-btn clear-btn" title="クリア">
                        <i class="fas fa-trash"></i>
                    </button>
                </section>
            </div>
        </aside>

        <main class="canvas-area">
            <div class="tool-status" id="tool-status">Mode: Pencil</div>
            <div id="canvas-container" class="canvas-container">
                <canvas id="main-canvas"></canvas>
                <div id="drop-zone" class="drop-zone-overlay">
                    <p><i class="fas fa-cloud-upload-alt"></i> 画像をドラッグ＆ドロップまたはクリックでアップロード</p>
                </div>
            </div>
        </main>
    </div>

    <!-- UI Overlay for cursor or hints -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="script.js?v=9"></script>
</body>
</html>
